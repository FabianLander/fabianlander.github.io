<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flat Tori Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }

        #gallery-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            background: rgba(15, 33, 61, 0.85);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .scene-btn {
            flex: 1;
            padding: 14px 12px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.55);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .scene-btn:hover {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.9);
        }

        .scene-btn.active {
            color: #fff;
            border-bottom-color: #6b9fff;
            background: rgba(107, 159, 255, 0.1);
        }

        .scene-btn .subtitle {
            display: block;
            font-size: 10px;
            margin-top: 3px;
            opacity: 0.6;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            z-index: 50;
            display: none;
        }
